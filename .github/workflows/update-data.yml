name: Update game data
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node fetch-data.js
      - run: node -e "const d=require('./data.json'); require('fs').writeFileSync('data.js','GAME_DATA='+JSON.stringify(d))"
      - run: npx terser data.js -o data.js --compress --mangle --toplevel 2>/dev/null
      - run: cp index.src.html index.html && sed -i "s/__DATA_VERSION__/$(date +%s)/g" index.html && npx staticrypt index.html -p "1337" --short -t password_template.html -d encrypted 2>/dev/null && cp encrypted/index.html . && rm -rf encrypted
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json data.js index.html
          git diff --staged --quiet || git commit -m "auto: update game data"
          git push
