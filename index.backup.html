<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Games</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0b;
  --surface: #141516;
  --border: #1e1f22;
  --border-hover: #2e2f34;
  --text: #e8e8ea;
  --text-dim: #7a7a85;
  --accent: #4f8cff;
  --accent-bg: rgba(79, 140, 255, 0.1);
  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.1);
  --orange: #fbbf24;
  --orange-bg: rgba(251, 191, 36, 0.1);
  --radius: 10px;
  --radius-sm: 6px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 820px; margin: 0 auto; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
.status { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
.status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; display: none; }
.status-dot.active { display: block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.search-wrap { margin-bottom: 20px; }
#search {
  width: 100%; padding: 12px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 0.95rem; outline: none;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text-dim); }

.date-group { margin-bottom: 24px; }
.date-header {
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
}
.card:hover { border-color: var(--border-hover); }
.card-title {
  font-size: 0.95rem; font-weight: 500;
  margin-bottom: 8px; line-height: 1.4;
}
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; min-height: 22px; }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.72rem; font-weight: 500; padding: 2px 10px;
  border-radius: 20px; white-space: nowrap;
}
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-dim { background: var(--border); color: var(--text-dim); font-style: italic; }

.card-links { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
.card-links a {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.78rem; padding: 5px 12px; border-radius: var(--radius-sm);
  text-decoration: none;
}
.link-source { color: var(--accent); background: var(--accent-bg); }
.link-source:hover { background: rgba(79, 140, 255, 0.2); }
.link-target { color: var(--green); background: var(--green-bg); }
.link-target:hover { background: rgba(52, 211, 153, 0.2); }
.link-trailer { color: var(--orange); background: var(--orange-bg); }
.link-trailer:hover { background: rgba(251, 191, 36, 0.2); }

.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 0.9rem; }
.empty code { background: var(--surface); padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
.stats { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 16px; }

@media (max-width: 600px) {
  body { padding: 16px 12px; }
  .header h1 { font-size: 1.25rem; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PC Games</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Loading...</span>
    </div>
  </div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="Search games..." autocomplete="off">
  </div>
  <div class="stats" id="stats"></div>
  <div id="results"></div>
</div>

<script>
const CACHE_KEY = 'pcgames_v3';
const CACHE_DAYS = 1;
const PARALLEL_DEEP = 5;

const statusText = document.getElementById('statusText');
const statusDot = document.getElementById('statusDot');
const resultsEl = document.getElementById('results');
const searchEl = document.getElementById('search');
const statsEl = document.getElementById('stats');

let allLinks = [];

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { data, timestamp } = JSON.parse(raw);
    if (Date.now() - timestamp < CACHE_DAYS * 864e5) return data;
  } catch {}
  return null;
}

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ data, timestamp: Date.now() }));
  } catch {}
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  const filtered = q ? allLinks.filter(l => l.title.toLowerCase().includes(q)) : allLinks;

  if (!filtered.length) {
    resultsEl.innerHTML = '<div class="empty">No games found</div>';
    statsEl.textContent = q ? `0 of ${allLinks.length} games` : '0 games';
    return;
  }

  const groups = {};
  for (const l of filtered) {
    const d = l.date || 'Unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(l);
  }

  const sorted = Object.keys(groups).sort((a, b) => {
    const [d1,m1,y1] = a.split('.').map(Number);
    const [d2,m2,y2] = b.split('.').map(Number);
    return new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1);
  });

  resultsEl.innerHTML = sorted.map(date => `
    <div class="date-group">
      <div class="date-header">${esc(date)}</div>
      ${groups[date].map(link => `
        <div class="card" data-url="${esc(link.url)}">
          <div class="card-title">${esc(link.title)}</div>
          <div class="card-meta" id="meta-${esc(link.url)}">
            ${link.filesize ? `<span class="badge badge-green">${esc(link.filesize)}</span>` : (link.deepDone === false ? '<span class="badge badge-dim">checking...</span>' : '')}
            ${link.updated ? '<span class="badge badge-orange">Updated</span>' : ''}
          </div>
          <div class="card-links" id="links-${esc(link.url)}">
            <a href="${esc(link.url)}" target="_blank" class="link-source">Source ↗</a>
            ${link.rapidgator ? `<a href="${esc(link.rapidgator)}" target="_blank" class="link-target">Download ↗</a>` : ''}
            ${link.youtube ? `<a href="${esc(link.youtube)}" target="_blank" class="link-trailer">Trailer ↗</a>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  statsEl.textContent = q
    ? `${filtered.length} of ${allLinks.length} games`
    : `${allLinks.length} games`;
}

function updateCard(url, data) {
  const meta = document.getElementById('meta-' + esc(url));
  const links = document.getElementById('links-' + esc(url));
  if (!meta || !links) return;

  if (data.filesize) {
    meta.innerHTML = `<span class="badge badge-green">${esc(data.filesize)}</span>`
      + (allLinks.find(l => l.url === url)?.updated ? '<span class="badge badge-orange">Updated</span>' : '');
  } else {
    const badge = meta.querySelector('.badge-dim');
    if (badge) badge.remove();
  }

  if (data.rapidgator) {
    links.insertAdjacentHTML('beforeend', `<a href="${esc(data.rapidgator)}" target="_blank" class="link-target">Download ↗</a>`);
  }
  if (data.youtube) {
    links.insertAdjacentHTML('beforeend', `<a href="${esc(data.youtube)}" target="_blank" class="link-trailer">Trailer ↗</a>`);
  }
}

function setBusy(busy) {
  statusDot.classList.toggle('active', busy);
}

async function deepCrawlAll() {
  const todo = allLinks.filter(l => !l.deepDone);
  if (!todo.length) return;

  setBusy(true);

  for (let i = 0; i < todo.length; i += PARALLEL_DEEP) {
    const batch = todo.slice(i, i + PARALLEL_DEEP);
    const results = await Promise.allSettled(batch.map(link =>
      fetch('/deep?url=' + encodeURIComponent(link.url)).then(r => r.json())
    ));

    for (let j = 0; j < batch.length; j++) {
      const link = batch[j];
      const result = results[j];
      if (result.status === 'fulfilled' && result.value.success) {
        link.filesize = result.value.filesize;
        link.rapidgator = result.value.rapidgator;
        link.youtube = result.value.youtube;
        link.deepDone = true;
        updateCard(link.url, result.value);
      } else {
        link.deepDone = true;
      }
    }

    statusText.textContent = `Deep crawl ${Math.min(i + PARALLEL_DEEP, todo.length)}/${todo.length}...`;
  }

  saveCache(allLinks);
  setBusy(false);
  statusText.textContent = `${allLinks.length} items`;
}

async function main() {
  const cached = loadCache();

  if (cached && cached.links && cached.links.length > 0) {
    allLinks = cached.links;
    render();
    statusText.textContent = `${allLinks.length} items`;
    deepCrawlAll();
    return;
  }

  setBusy(true);
  statusText.textContent = 'Fetching...';

  try {
    const res = await fetch('/crawl');
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');

    allLinks = json.links.map(l => ({ ...l, deepDone: false }));
    render();
    statusText.textContent = `${allLinks.length} items`;
    saveCache(allLinks);
    deepCrawlAll();
  } catch (err) {
    setBusy(false);
    statusText.textContent = 'Error: ' + err.message;
    resultsEl.innerHTML = `
      <div class="empty">
        Could not reach the local server.<br><br>
        Run <code>node server.js</code> in this directory,<br>
        then open <a href="http://localhost:3333">http://localhost:3333</a>
      </div>`;
  }
}

searchEl.addEventListener('input', render);
main();
</script>
</body>
</html>
