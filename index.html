<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--surface:#141516;--border:#1e1f22;--border-hover:#2e2f34;--text:#e8e8ea;--text-dim:#7a7a85;--accent:#4f8cff;--accent-bg:rgba(79,140,255,0.1);--green:#34d399;--green-bg:rgba(52,211,153,0.1);--orange:#fbbf24;--orange-bg:rgba(251,191,36,0.1);--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 16px;line-height:1.5;-webkit-font-smoothing:antialiased}
.container{max-width:820px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em}
.status{font-size:0.8rem;color:var(--text-dim)}
#fetchDate{font-size:0.75rem;color:var(--text-dim);margin-bottom:16px}
.search-wrap{margin-bottom:20px}
#search{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.95rem;outline:none}
#search:focus{border-color:var(--accent)}#search::placeholder{color:var(--text-dim)}
.date-group{margin-bottom:24px}
.date-header{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.card:hover{border-color:var(--border-hover)}
.card-title{font-size:0.95rem;font-weight:500;margin-bottom:8px;line-height:1.4}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;min-height:22px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:500;padding:2px 10px;border-radius:20px;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-dim{background:var(--border);color:var(--text-dim);font-style:italic}
.card-links{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.card-links a{display:inline-flex;align-items:center;gap:4px;font-size:0.78rem;padding:5px 12px;border-radius:6px;text-decoration:none}
.link-source{color:var(--accent);background:var(--accent-bg)}
.link-source:hover{background:rgba(79,140,255,0.2)}
.link-target{color:var(--green);background:var(--green-bg)}
.link-target:hover{background:rgba(52,211,153,0.2)}
.link-trailer{color:var(--orange);background:var(--orange-bg)}
.link-trailer:hover{background:rgba(251,191,36,0.2)}
.empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:0.9rem;line-height:1.8}
.empty code{background:var(--surface);padding:2px 8px;border-radius:4px;font-size:0.85rem}
.stats{font-size:0.78rem;color:var(--text-dim);margin-bottom:16px}
@media(max-width:600px){body{padding:16px 12px}.header h1{font-size:1.25rem}}
</style>
</head>
<body>
<div id="loginScreen" style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="text-align:center;">
    <h1 style="font-size:1.5rem;font-weight:600;margin-bottom:20px;">PC Games</h1>
    <input type="password" id="passInput" placeholder="Password" autofocus
      style="padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;outline:none;width:220px;"
      onkeydown="if(event.key==='Enter')login()">
    <br>
    <button onclick="login()" style="margin-top:12px;padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;">Enter</button>
    <p id="loginError" style="color:#ef4444;font-size:0.85rem;margin-top:10px;display:none;">Wrong password</p>
  </div>
</div>

<div id="app" style="display:none">
<div class="container">
  <div class="header">
    <h1>PC Games</h1>
    <div class="status" id="statusText">Loading...</div>
  </div>
  <div id="fetchDate"></div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="Search games..." autocomplete="off">
  </div>
  <div class="stats" id="stats"></div>
  <div id="results"></div>
</div>
</div>

<script>
const PASSWORD = '1337'
const COOKIE_NAME = 'pcgames_auth'

function setCookie(name, val, days) {
  const d = new Date(Date.now() + days * 864e5)
  document.cookie = name + '=' + val + '; expires=' + d.toUTCString() + '; path=/'
}

function getCookie(name) {
  return document.cookie.match('(^|; )' + name + '=([^;]*)')?.[2]
}

function login() {
  const val = document.getElementById('passInput').value
  if (val === PASSWORD) {
    setCookie(COOKIE_NAME, val, 180)
    document.getElementById('loginScreen').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    main()
  } else {
    document.getElementById('loginError').style.display = 'block'
  }
}

if (getCookie(COOKIE_NAME) === PASSWORD) {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  main()
}

const CACHE_KEY = 'pcgames_v4'
const CACHE_TTL = 864e5 // 1 day
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
]

const $ = s => document.querySelector(s)
const statusEl = $('#statusText')
const dateEl = $('#fetchDate')
const resultsEl = $('#results')
const searchEl = $('#search')
const statsEl = $('#stats')

let allLinks = []

function esc(s) {
  if (!s) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function render() {
  const q = searchEl.value.trim().toLowerCase()
  const filtered = q ? allLinks.filter(l => l.title.toLowerCase().includes(q)) : allLinks

  if (!filtered.length) {
    resultsEl.innerHTML = '<div class="empty">No games found</div>'
    statsEl.textContent = ''
    return
  }

  const groups = {}
  for (const l of filtered) {
    const d = l.date || 'Unknown'
    if (!groups[d]) groups[d] = []
    groups[d].push(l)
  }

  const sorted = Object.keys(groups).sort((a, b) => {
    const [d1,m1,y1] = a.split('.').map(Number)
    const [d2,m2,y2] = b.split('.').map(Number)
    return new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1)
  })

  resultsEl.innerHTML = sorted.map(date => `
    <div class="date-group">
      <div class="date-header">${esc(date)}</div>
      ${groups[date].map(link => `
        <div class="card">
          <div class="card-title">${esc(link.title)}</div>
          <div class="card-meta">
            ${link.filesize ? `<span class="badge badge-green">${esc(link.filesize)}</span>` : ''}
            ${link.updated ? '<span class="badge badge-orange">Updated</span>' : ''}
          </div>
          <div class="card-links">
            <a href="${esc(link.url)}" target="_blank" class="link-source">Source ↗</a>
            ${link.rapidgator ? `<a href="${esc(link.rapidgator)}" target="_blank" class="link-target">Download ↗</a>` : ''}
            ${link.youtube ? `<a href="${esc(link.youtube)}" target="_blank" class="link-trailer">Trailer ↗</a>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('')

  statsEl.textContent = ''
}

searchEl.addEventListener('input', render)

function setData(links, fetched) {
  allLinks = links
  render()
  statusEl.textContent = `${links.length} items`
  if (fetched) {
    const d = new Date(fetched)
    dateEl.textContent = `Updated ${d.toLocaleDateString()} ${d.toLocaleTimeString()}`
  }
}

async function tryProxies(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      statusEl.textContent = `Trying proxy ${i + 1}/${PROXIES.length}...`
      const res = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(15000) })
      if (!res.ok) continue
      return await res.text()
    } catch {}
  }
  throw new Error('All proxies failed')
}

function parseLinks(html) {
  const sections = {}
  let currentDate = null
  for (const line of html.split('\n')) {
    const h1 = line.match(/<h1[^>]*>(.*?)<\/h1>/i)
    if (h1) {
      const dmy = h1[1].match(/(\d{2})\.(\d{2})\.(\d{4})/)
      if (dmy) { currentDate = `${dmy[1]}.${dmy[2]}.${dmy[3]}`; sections[currentDate] = [] }
      continue
    }
    if (!currentDate) continue
    const h3 = line.match(/<(h3|h5)[^>]*>(.*?)<\/\1>/i)
    if (h3) {
      const a = h3[2].match(/<a\s+href="([^"]+\.html)"[^>]*>/i)
      if (a) {
        const url = new URL(a[1], 'https://elamigos.site').href
        const title = h3[2].replace(/<[^>]+>/g, '').replace(/DOWNLOAD|ElAmigos|Repack|Update/gi, '').trim()
        if (!sections[currentDate].some(l => l.url === url)) {
          sections[currentDate].push({ url, title, date: currentDate, updated: h3[1].toLowerCase() === 'h5' })
        }
      }
    }
  }
  const sorted = Object.keys(sections).sort((a, b) => {
    const [d1,m1,y1] = a.split('.').map(Number)
    const [d2,m2,y2] = b.split('.').map(Number)
    return new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1)
  })
  const links = []
  for (const date of sorted) links.push(...sections[date])
  return links.slice(0, 200)
}

function parseDeepPage(body) {
  const sz = body.match(/(\d+(?:\.\d+)?)\s*(GB|MB)/i)
  const filesize = sz ? `${sz[1]} ${sz[2].toUpperCase()}` : null
  const yt = body.match(/https?:\/\/(?:www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/)
  const youtube = yt ? yt[0] : null
  const rg = body.match(/https?:\/\/filecrypt\.cc\/Container\/[^"'\s<>]+/)
  const rapidgator = rg ? rg[0] : null
  return { filesize, youtube, rapidgator }
}

async function liveFetch() {
  statusEl.textContent = 'Fetching...'
  const html = await tryProxies('https://elamigos.site')
  const links = parseLinks(html)

  for (let i = 0; i < links.length; i++) {
    statusEl.textContent = `Deep ${i + 1}/${links.length}...`
    try {
      const deepHtml = await tryProxies(links[i].url)
      Object.assign(links[i], parseDeepPage(deepHtml))
    } catch {}
  }

  const payload = { links, fetched: Date.now() }
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(payload)) } catch {}
  setData(links, Date.now())
}

async function main() {
  // 1. Try data.json (primary for GitHub Pages)
  try {
    const res = await fetch('data.json')
    if (res.ok) {
      const data = await res.json()
      if (data.links && data.links.length) {
        setData(data.links, data.fetched)
        return
      }
    }
  } catch {}

  // 2. Try localStorage cache
  try {
    const raw = localStorage.getItem(CACHE_KEY)
    if (raw) {
      const { data, timestamp } = JSON.parse(raw)
      if (Date.now() - timestamp < CACHE_TTL) {
        setData(data.links || data, data.fetched || timestamp)
        return
      }
    }
  } catch {}

  // 3. Live fetch via CORS proxy
  try {
    await liveFetch()
  } catch (err) {
    statusEl.textContent = 'Could not load data'
    resultsEl.innerHTML = `
      <div class="empty">
        No game data available.<br><br>
        This page works best with GitHub Pages:<br>
        Push this file to a repo, enable Pages, and a bot keeps it updated.<br><br>
        <code style="font-size:0.9rem">github.com/yourname/yourrepo</code>
      </div>`
  }
}

</script>
</body>
</html>
