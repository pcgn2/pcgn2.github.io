<!DOCTYPE html>
<html class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>Protected Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
<meta http-equiv="pragma" content="no-cache" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--surface:#141516;--border:#1e1f22;--border-hover:#2e2f34;--text:#e8e8ea;--text-dim:#7a7a85;--accent:#4f8cff;--accent-bg:rgba(79,140,255,0.1);--radius:10px}
.staticrypt-html, .staticrypt-body{height:100%}
.staticrypt-body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased}
.staticrypt-page{width:360px;max-width:100%;margin:auto}
.staticrypt-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center}
.staticrypt-title{font-size:1.2rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:8px}
.staticrypt-instructions{margin-bottom:16px;font-size:0.85rem;color:var(--text-dim)}
.staticrypt-hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.staticrypt-password-container{position:relative;margin-bottom:16px}
.staticrypt-password-container input{width:100%;padding:12px 40px 12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;outline:none;box-sizing:border-box}
.staticrypt-password-container input:focus{border-color:var(--accent)}
.staticrypt-toggle-password-visibility{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;opacity:.6;height:18px;width:18px;padding:0}
.staticrypt-decrypt-button{width:100%;padding:12px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:14px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:0.03em}
.staticrypt-decrypt-button:hover{filter:brightness(1.15)}
.staticrypt-decrypt-button:active{filter:brightness(0.9)}
.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;font-size:0.82rem;color:var(--text-dim);cursor:pointer;user-select:none}
.staticrypt-remember input[type=checkbox]{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,background .15s;margin:0}
.staticrypt-remember input[type=checkbox]:checked{border-color:var(--accent);background:var(--accent-bg)}
.staticrypt-remember input[type=checkbox]:checked::after{content:'';display:block;width:5px;height:9px;border:solid var(--accent);border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px}
.hidden{display:none!important}
.staticrypt-spinner-container{display:flex;align-items:center;justify-content:center;height:200px}
.staticrypt-spinner{width:2rem;height:2rem;border:.25em solid var(--border);border-right-color:var(--accent);border-radius:50%;animation:spinner-border .75s linear infinite}
@keyframes spinner-border{to{transform:rotate(360deg)}}
</style>
</head>
